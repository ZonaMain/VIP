<script>
// Fungsi Timer Baru yang Bergerak Cepat (Milidetik)
function startFastTimer(durationSeconds) {
    let totalMs = durationSeconds * 1000;
    let endTime = Date.now() + totalMs;
    const displayMain = document.getElementById('min-sec');
    const displayMs = document.getElementById('ms');

    function update() {
        let remaining = endTime - Date.now();
        if (remaining <= 0) {
            endTime = Date.now() + totalMs; // Auto-reset
            remaining = totalMs;
        }

        let m = Math.floor(remaining / 60000);
        let s = Math.floor((remaining % 60000) / 1000);
        let ms = Math.floor((remaining % 1000) / 10);

        if(displayMain) displayMain.innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        if(displayMs) displayMs.innerText = `.${String(ms).padStart(2, '0')}`;
        
        requestAnimationFrame(update);
    }
    update();
}

// Jalankan semua fungsi saat window load
